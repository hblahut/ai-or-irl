<!DOCTYPE html>
<html>

<head>

<title>AI or IRL</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
overflow-x:hidden;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.score{
margin-top:10px;
font-size:18px;
}

#card{
position:relative;
touch-action:none;
transition:transform .25s ease, opacity .25s ease;
opacity:0;
}

video,img{
width:100%;
border-radius:12px;
margin-top:20px;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:20px;
}

button{
width:48%;
padding:16px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.ai{background:#ff6b6b;color:white;}
.irl{background:#4CAF50;color:white;}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
padding:20px;
border-radius:12px;
}

.hidden{display:none;}

.tip{margin-top:10px}

.swipe-arrows{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:20px;
font-weight:bold;
}

.swipe-left{color:#ff4d4d}
.swipe-right{color:#2ecc71}

.start{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
padding:40px;
}

.start button{
margin-top:30px;
padding:16px 24px;
font-size:18px;
border:none;
border-radius:10px;
background:#333;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="startScreen" class="start">

<h1>AI or IRL</h1>

<p>
Swipe LEFT if you think the media is AI.<br><br>
Swipe RIGHT if you think it is real.
</p>

<button onclick="startGame()">Start Game</button>

</div>

<div id="game" class="container hidden">

<h1>AI or IRL</h1>

<div class="score">
Score: <span id="score">0</span><br>
🔥 Streak: <span id="streak">0</span><br>
Level: <span id="level">1</span>
</div>

<div id="card">

<div id="media">Loading...</div>

<div id="overlay" class="overlay hidden">

<h2 id="result"></h2>

<p id="tip" class="tip"></p>

<button onclick="nextRound()">Next</button>

</div>

</div>

<div class="swipe-arrows">
<div class="swipe-left">⬅ AI</div>
<div class="swipe-right">REAL ➡</div>
</div>

<div class="buttons" id="buttons">
<button class="ai" onclick="guess('ai')">⬅ AI</button>
<button class="irl" onclick="guess('real')">IRL ➡</button>
</div>

</div>

<script>

let score=0
let streak=0
let level=1
let currentMedia=null
let locked=false

let startX=0
let currentX=0
let dragging=false

let isMobile = window.innerWidth < 768

if(isMobile){
document.getElementById("buttons").style.display="none"
}

function startGame(){
document.getElementById("startScreen").style.display="none"
document.getElementById("game").classList.remove("hidden")
pickMedia()
}

let media=[

{type:"image",url:"https://picsum.photos/400?1",answer:"real",level:1},

{type:"image",url:"https://picsum.photos/400?2",answer:"ai",level:1},

{type:"video",url:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",answer:"real",level:2},

{type:"video",url:"https://www.w3schools.com/html/mov_bbb.mp4",answer:"ai",level:3}

]

function updateLevel(){

if(score>10) level=3
else if(score>5) level=2
else level=1

document.getElementById("level").innerText=level

}

function pickMedia(){

let possible=media.filter(m=>m.level<=level)
currentMedia=possible[Math.floor(Math.random()*possible.length)]

renderMedia()

}

function renderMedia(){

locked=false
document.getElementById("card").style.opacity=1

if(currentMedia.type==="image"){

let img=new Image()

img.onload=()=>{
document.getElementById("media").innerHTML=""
document.getElementById("media").appendChild(img)
}

img.src=currentMedia.url+"&"+Math.random()

}

else{

document.getElementById("media").innerHTML=
`<video autoplay muted loop playsinline>
<source src="${currentMedia.url}" type="video/mp4">
</video>`

}

}

function guess(answer){

if(locked) return
locked=true

let correct=currentMedia.answer

if(answer===correct){

score++
streak++

document.getElementById("result").innerText=`Correct – ${correct.toUpperCase()}!`

updateLevel()

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

setTimeout(nextRound,800)

}

else{

streak=0

document.getElementById("result").innerText=`Incorrect – ${correct.toUpperCase()}!`

generateTip()

document.getElementById("overlay").classList.remove("hidden")

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

}

}

function nextRound(){

document.getElementById("overlay").classList.add("hidden")

document.getElementById("card").style.transform="translateX(0)"

pickMedia()

}

function generateTip(){

let tips=[
"Look closely at symmetry in eyes or hair.",
"AI often struggles with lighting consistency.",
"Deepfakes may show unnatural blinking.",
"Background objects may look warped."
]

let tip=tips[Math.floor(Math.random()*tips.length)]

document.getElementById("tip").innerText=tip

}

const card=document.getElementById("card")

if(isMobile){

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
dragging=true
})

card.addEventListener("touchmove",e=>{

if(!dragging) return

currentX=e.touches[0].clientX-startX
card.style.transform=`translateX(${currentX}px)`

})

card.addEventListener("touchend",()=>{

dragging=false

if(currentX>120){
card.style.transform="translateX(500px)"
guess("real")
}

else if(currentX<-120){
card.style.transform="translateX(-500px)"
guess("ai")
}

else{
card.style.transform="translateX(0)"
}

currentX=0

})

}

</script>

</body>

</html>
