<!DOCTYPE html>
<html>

<head>

<title>AI or IRL</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
overflow-x:hidden;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

h1{
margin-top:10px;
}

.score{
margin-top:10px;
font-size:18px;
}

#card{
position:relative;
touch-action:none;
transition:transform .25s ease;
}

video,img{
width:100%;
border-radius:12px;
margin-top:20px;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:20px;
}

button{
width:48%;
padding:16px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.ai{
background:#ff6b6b;
color:white;
}

.irl{
background:#4CAF50;
color:white;
}

.next{
background:#333;
color:white;
margin-top:15px;
width:100%;
}

.tip{
margin-top:10px;
color:#444;
}

.swipe-hint{
margin-top:8px;
color:#777;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI or IRL</h1>

<div class="score">
Score: <span id="score">0</span><br>
🔥 Streak: <span id="streak">0</span><br>
Level: <span id="level">1</span>
</div>

<div id="card">
<div id="media">Loading...</div>
</div>

<div class="swipe-hint">
← Swipe or Click →
</div>

<div class="buttons">
<button class="ai" onclick="guess('ai')">⬅ AI</button>
<button class="irl" onclick="guess('real')">IRL ➡</button>
</div>

<p id="result"></p>
<p id="tip" class="tip"></p>

<button id="nextBtn" class="next" onclick="nextRound()" style="display:none">
Next →
</button>

</div>

<script>

let score=0
let streak=0
let level=1
let currentMedia=null

let startX=0
let currentX=0
let dragging=false

let media=[

{type:"image",url:"https://picsum.photos/400?1",answer:"real",level:1},

{type:"image",url:"https://picsum.photos/400?2",answer:"ai",level:1},

{type:"video",url:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",answer:"real",level:2},

{type:"video",url:"https://www.w3schools.com/html/mov_bbb.mp4",answer:"ai",level:3}

]

function updateLevel(){

if(score>10){level=3}
else if(score>5){level=2}
else{level=1}

document.getElementById("level").innerText=level

}

function pickMedia(){

let possible=media.filter(m=>m.level<=level)

currentMedia=possible[Math.floor(Math.random()*possible.length)]

renderMedia()

}

function renderMedia(){

if(currentMedia.type==="image"){

let img=new Image()

img.onload=()=>{
document.getElementById("media").innerHTML=""
document.getElementById("media").appendChild(img)
}

img.src=currentMedia.url+"&"+Math.random()

}

else{

document.getElementById("media").innerHTML=
`<video autoplay muted loop playsinline>
<source src="${currentMedia.url}" type="video/mp4">
</video>`

}

}

function guess(answer){

if(answer===currentMedia.answer){

score++
streak++

document.getElementById("result").innerText="✅ Correct"
document.getElementById("tip").innerText=""

updateLevel()

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

setTimeout(()=>nextRound(),600)

}

else{

streak=0

document.getElementById("result").innerText="❌ Incorrect"

generateTip()

updateLevel()

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

document.getElementById("nextBtn").style.display="block"

}

}

function nextRound(){

document.getElementById("result").innerText=""
document.getElementById("tip").innerText=""
document.getElementById("nextBtn").style.display="none"

document.getElementById("card").style.transform="translateX(0)"

pickMedia()

}

function generateTip(){

let tips=[

"Look closely at symmetry in eyes or hair.",

"AI often struggles with lighting consistency.",

"Deepfakes may show unnatural blinking.",

"Background objects can appear distorted."

]

let tip=tips[Math.floor(Math.random()*tips.length)]

document.getElementById("tip").innerText="Tip: "+tip

}

/* SWIPE HANDLING */

const card=document.getElementById("card")

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
dragging=true
})

card.addEventListener("touchmove",e=>{

if(!dragging) return

currentX=e.touches[0].clientX-startX

card.style.transform=`translateX(${currentX}px)`

})

card.addEventListener("touchend",()=>{

dragging=false

if(currentX>120){

card.style.transform="translateX(600px)"
guess("real")

}

else if(currentX<-120){

card.style.transform="translateX(-600px)"
guess("ai")

}

else{

card.style.transform="translateX(0)"

}

currentX=0

})

pickMedia()

</script>

</body>

</html>
