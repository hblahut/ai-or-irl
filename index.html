<!DOCTYPE html>
<html>

<head>
<title>AI or IRL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

#card{
position:relative;
transition:transform .25s ease, background .25s ease;
border-radius:12px;
}

img{
width:100%;
border-radius:12px;
margin-top:20px;
}

.swipe-arrows{
display:flex;
justify-content:space-between;
margin-top:12px;
font-size:22px;
font-weight:bold;
}

.swipe-left{color:#ff4d4d}
.swipe-right{color:#2ecc71}

.buttons{
display:flex;
justify-content:space-between;
margin-top:20px;
}

button{
width:48%;
padding:16px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.ai{background:#ff6b6b;color:white;}
.real{background:#4CAF50;color:white;}

#result{
font-size:22px;
font-weight:bold;
margin-top:12px;
height:30px;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
border-radius:12px;
padding:20px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="container">

<h1>AI or IRL</h1>

<div>
Score: <span id="score">0</span><br>
🔥 Streak: <span id="streak">0</span>
</div>

<div id="card">

<img id="image">

<div id="overlay" class="overlay hidden">

<h2 id="overlayResult"></h2>
<p id="tip"></p>

<button onclick="nextRound()">Next</button>

</div>

</div>

<div id="result"></div>

<div class="swipe-arrows">
<div class="swipe-left">⬅ AI</div>
<div class="swipe-right">REAL ➡</div>
</div>

<div class="buttons">
<button class="ai" onclick="guess('ai')">⬅ AI</button>
<button class="real" onclick="guess('real')">REAL ➡</button>
</div>

</div>

<script>

let score=0
let streak=0
let currentAnswer=""
let locked=false

const aiImages=[
"https://thispersondoesnotexist.com/?1",
"https://thispersondoesnotexist.com/?2",
"https://thispersondoesnotexist.com/?3"
]

const realImages=[
"https://picsum.photos/400?1",
"https://picsum.photos/400?2",
"https://picsum.photos/400?3"
]

function newRound(){

locked=false

document.getElementById("result").innerText=""
document.getElementById("card").style.background="transparent"

let isAI=Math.random()<0.5

if(isAI){

currentAnswer="ai"
setImage(aiImages[Math.floor(Math.random()*aiImages.length)])

}else{

currentAnswer="real"
setImage(realImages[Math.floor(Math.random()*realImages.length)])

}

}

function setImage(url){

const img=document.getElementById("image")
img.src=url+"&"+Math.random()

}

function guess(answer){

if(locked)return
locked=true

const correct=currentAnswer

if(answer===correct){

score++
streak++

document.getElementById("result").innerText=`Correct — ${correct.toUpperCase()}!`
document.getElementById("card").style.background="#c8f7c5"

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

setTimeout(newRound,1200)

}else{

streak=0

document.getElementById("overlayResult").innerText=`Incorrect — ${correct.toUpperCase()}!`
generateTip()

document.getElementById("overlay").classList.remove("hidden")

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

}

}

function nextRound(){

document.getElementById("overlay").classList.add("hidden")
newRound()

}

function generateTip(){

const tips=[
"Look for strange symmetry in faces.",
"AI often struggles with teeth and earrings.",
"Background objects may warp unnaturally.",
"Lighting may look inconsistent."
]

document.getElementById("tip").innerText=
tips[Math.floor(Math.random()*tips.length)]

}

newRound()

</script>

</body>

</html>
