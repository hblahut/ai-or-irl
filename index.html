<!DOCTYPE html>
<html>

<head>

<title>AI or IRL</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
overflow-x:hidden;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

h1{
margin-top:10px;
}

.score{
margin-top:10px;
font-size:18px;
}

#card{
position:relative;
touch-action:none;
transition:transform .25s ease;
}

video,img{
width:100%;
border-radius:12px;
margin-top:20px;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:20px;
}

button{
width:48%;
padding:16px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.ai{
background:#ff6b6b;
color:white;
}

.irl{
background:#4CAF50;
color:white;
}

.next{
background:white;
color:black;
margin-top:15px;
width:100%;
}

.overlay{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.75);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;
padding:20px;
border-radius:12px;

}

.tip{
margin-top:10px;
font-size:16px;
}

.hidden{
display:none;
}

.start-screen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
padding:40px;
}

.start-button{
margin-top:30px;
padding:16px 24px;
font-size:18px;
border:none;
border-radius:10px;
background:#333;
color:white;
cursor:pointer;
}

.instructions{
margin-top:20px;
font-size:18px;
line-height:1.6;
}

</style>

</head>

<body>

<div id="startScreen" class="start-screen">

<h1>AI or IRL</h1>

<div class="instructions">
Swipe <b>LEFT</b> if you think the media is AI.<br><br>
Swipe <b>RIGHT</b> if you think it is real.
</div>

<button class="start-button" onclick="startGame()">Start Game</button>

</div>


<div id="game" class="container hidden">

<h1>AI or IRL</h1>

<div class="score">
Score: <span id="score">0</span><br>
🔥 Streak: <span id="streak">0</span><br>
Level: <span id="level">1</span>
</div>

<div id="card">

<div id="media">Loading...</div>

<div id="overlay" class="overlay hidden">

<h2 id="result"></h2>

<p id="tip" class="tip"></p>

<button class="next" onclick="nextRound()">Next</button>

</div>

</div>

<div class="buttons" id="buttons">

<button class="ai" onclick="guess('ai')">
⬅ AI
</button>

<button class="irl" onclick="guess('real')">
IRL ➡
</button>

</div>

</div>

<script>

let score=0
let streak=0
let level=1
let currentMedia=null

let startX=0
let currentX=0
let dragging=false

let isMobile = window.innerWidth < 768

if(isMobile){
document.getElementById("buttons").style.display="none"
}

function startGame(){

document.getElementById("startScreen").style.display="none"
document.getElementById("game").classList.remove("hidden")

pickMedia()

}

let media=[

{type:"image",url:"https://picsum.photos/400?1",answer:"real",level:1},

{type:"image",url:"https://picsum.photos/400?2",answer:"ai",level:1},

{type:"video",url:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",answer:"real",level:2},

{type:"video",url:"https://www.w3schools.com/html/mov_bbb.mp4",answer:"ai",level:3}

]

function updateLevel(){

if(score>10){level=3}
else if(score>5){level=2}
else{level=1}

document.getElementById("level").innerText=level

}

function pickMedia(){

let possible=media.filter(m=>m.level<=level)

currentMedia=possible[Math.floor(Math.random()*possible.length)]

renderMedia()

}

function renderMedia(){

if(currentMedia.type==="image"){

let img=new Image()

img.onload=()=>{
document.getElementById("media").innerHTML=""
document.getElementById("media").appendChild(img)
}

img.src=currentMedia.url+"&"+Math.random()

}

else{

document.getElementById("media").innerHTML=
`<video autoplay muted loop playsinline>
<source src="${currentMedia.url}" type="video/mp4">
</video>`

}

}

function guess(answer){

if(answer===currentMedia.answer){

score++
streak++

updateLevel()

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

setTimeout(()=>nextRound(),600)

}

else{

streak=0

document.getElementById("result").innerText="Incorrect"

generateTip()

document.getElementById("overlay").classList.remove("hidden")

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

}

}

function nextRound(){

document.getElementById("overlay").classList.add("hidden")

document.getElementById("card").style.transform="translateX(0)"

pickMedia()

}

function generateTip(){

let tips=[

"Look closely at symmetry in eyes or hair.",

"AI often struggles with lighting consistency.",

"Deepfakes may show unnatural blinking.",

"Background objects may look warped."

]

let tip=tips[Math.floor(Math.random()*tips.length)]

document.getElementById("tip").innerText=tip

}

const card=document.getElementById("card")

if(isMobile){

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
dragging=true
})

card.addEventListener("touchmove",e=>{

if(!dragging)return

currentX=e.touches[0].clientX-startX

card.style.transform=`translateX(${currentX}px)`

})

card.addEventListener("touchend",()=>{

dragging=false

if(currentX>120){

card.style.transform="translateX(600px)"
guess("real")

}

else if(currentX<-120){

card.style.transform="translateX(-600px)"
guess("ai")

}

else{

card.style.transform="translateX(0)"

}

currentX=0

})

}

</script>

</body>

</html>
