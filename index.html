<!DOCTYPE html>
<html>

<head>

<title>AI or IRL</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

h1{
margin-top:10px;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:20px;
}

button{
width:48%;
padding:16px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.ai{
background:#ff6b6b;
color:white;
}

.irl{
background:#4CAF50;
color:white;
}

.next{
background:#333;
color:white;
margin-top:15px;
width:100%;
}

#result{
font-size:20px;
margin-top:15px;
font-weight:bold;
}

.tip{
margin-top:10px;
font-size:15px;
color:#444;
}

.score{
margin-top:10px;
font-size:18px;
}

video,img{
width:100%;
border-radius:12px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI or IRL</h1>

<div class="score">
Score: <span id="score">0</span><br>
🔥 Streak: <span id="streak">0</span><br>
Level: <span id="level">1</span>
</div>

<div id="media"></div>

<div class="buttons">

<button class="ai" onclick="guess('ai')" id="aiBtn">
⬅ AI
</button>

<button class="irl" onclick="guess('real')" id="irlBtn">
IRL ➡
</button>

</div>

<p id="result"></p>
<p id="tip" class="tip"></p>

<button id="nextBtn" class="next" onclick="nextRound()" style="display:none">
Next →
</button>

</div>

<script>

let score = 0
let streak = 0
let level = 1

let currentMedia = null

let media = [

{
type:"image",
url:"https://thispersondoesnotexist.com/",
answer:"ai",
level:1
},

{
type:"image",
url:"https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png",
answer:"real",
level:1
},

{
type:"video",
url:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",
answer:"real",
level:2
},

{
type:"video",
url:"https://www.w3schools.com/html/mov_bbb.mp4",
answer:"ai",
level:3
}

]

function updateLevel(){

if(score > 10){
level = 3
}
else if(score > 5){
level = 2
}
else{
level = 1
}

document.getElementById("level").innerText = level

}

function pickMedia(){

let possible = media.filter(item => item.level <= level)

currentMedia = possible[Math.floor(Math.random()*possible.length)]

renderMedia()

}

function renderMedia(){

if(currentMedia.type === "image"){

document.getElementById("media").innerHTML =
`<img src="${currentMedia.url}?${Math.random()}">`

}
else{

document.getElementById("media").innerHTML =
`<video autoplay muted loop playsinline>
<source src="${currentMedia.url}" type="video/mp4">
</video>`

}

}

function guess(answer){

document.getElementById("aiBtn").disabled = true
document.getElementById("irlBtn").disabled = true

if(answer === currentMedia.answer){

score++
streak++

document.getElementById("result").innerText="✅ Correct"
document.getElementById("tip").innerText=""

}
else{

streak = 0

document.getElementById("result").innerText="❌ Incorrect"

generateAITip()

}

updateLevel()

document.getElementById("score").innerText = score
document.getElementById("streak").innerText = streak

document.getElementById("nextBtn").style.display = "block"

}

function nextRound(){

document.getElementById("result").innerText=""
document.getElementById("tip").innerText=""

document.getElementById("nextBtn").style.display="none"

document.getElementById("aiBtn").disabled = false
document.getElementById("irlBtn").disabled = false

pickMedia()

}

function generateAITip(){

let tips = [

"Look closely at earrings, teeth, and hair symmetry.",

"AI images often struggle with consistent lighting.",

"Deepfakes sometimes show unnatural blinking or lip sync.",

"Check for distorted background objects."

]

let randomTip = tips[Math.floor(Math.random()*tips.length)]

document.getElementById("tip").innerText="Tip: " + randomTip

}

pickMedia()

</script>

</body>

</html>
