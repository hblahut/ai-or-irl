<!DOCTYPE html>
<html>

<head>
<title>AI or IRL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

#card{
position:relative;
transition:transform .25s ease;
}

img{
width:100%;
border-radius:12px;
margin-top:20px;
}

.swipe-arrows{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
font-size:18px;
font-weight:bold;
}

.swipe-left{color:#ff4d4d}
.swipe-right{color:#2ecc71}

.swipe-middle{
color:#666;
font-size:16px;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
border-radius:12px;
padding:20px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="container">

<h1>AI or IRL</h1>

<div>
Score: <span id="score">0</span><br>
🔥 Streak: <span id="streak">0</span>
</div>

<div id="card">

<img id="image">

<div id="overlay" class="overlay hidden">

<h2 id="result"></h2>
<p id="tip"></p>

<button onclick="nextRound()">Next</button>

</div>

</div>

<div class="swipe-arrows">
<div class="swipe-left">⬅ AI</div>
<div class="swipe-middle">Swipe to decide</div>
<div class="swipe-right">REAL ➡</div>
</div>

</div>

<script>

let score=0
let streak=0
let currentAnswer=""
let locked=false

let startX=0
let currentX=0
let dragging=false

const card=document.getElementById("card")

/* IMAGE DATA */

const aiImages=[
"https://thispersondoesnotexist.com/?1",
"https://thispersondoesnotexist.com/?2",
"https://thispersondoesnotexist.com/?3",
"https://thispersondoesnotexist.com/?4"
]

const realImages=[
"https://picsum.photos/400?1",
"https://picsum.photos/400?2",
"https://picsum.photos/400?3",
"https://picsum.photos/400?4"
]

function newRound(){

locked=false

let isAI=Math.random()<0.5

if(isAI){

currentAnswer="ai"
setImage(aiImages[Math.floor(Math.random()*aiImages.length)])

}else{

currentAnswer="real"
setImage(realImages[Math.floor(Math.random()*realImages.length)])

}

}

function setImage(url){

const img=document.getElementById("image")

img.src="" 

setTimeout(()=>{
img.src=url+"&"+Math.random()
},50)

}

function guess(answer){

if(locked)return
locked=true

let correct=currentAnswer

if(answer===correct){

score++
streak++

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

setTimeout(newRound,900)

}else{

streak=0

document.getElementById("result").innerText=`Incorrect — ${correct.toUpperCase()}!`

/* TIP ONLY WHEN AI GUESSED AS REAL */

if(correct==="ai" && answer==="real"){
generateTip()
}else{
document.getElementById("tip").innerText=""
}

document.getElementById("overlay").classList.remove("hidden")

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

}

}

function nextRound(){

document.getElementById("overlay").classList.add("hidden")

newRound()

}

function generateTip(){

const tips=[
"Look for strange symmetry in faces.",
"AI often struggles with teeth and earrings.",
"Hair strands may blend into the background.",
"Earrings or glasses may be mismatched."
]

document.getElementById("tip").innerText=
tips[Math.floor(Math.random()*tips.length)]

}

/* SWIPE */

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
dragging=true
})

card.addEventListener("touchmove",e=>{

if(!dragging)return

currentX=e.touches[0].clientX-startX
card.style.transform=`translateX(${currentX}px)`

})

card.addEventListener("touchend",()=>{

dragging=false

if(currentX>120){
card.style.transform="translateX(500px)"
guess("real")
}

else if(currentX<-120){
card.style.transform="translateX(-500px)"
guess("ai")
}

else{
card.style.transform="translateX(0)"
}

currentX=0

})

newRound()

</script>

</body>

</html>
