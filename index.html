<!DOCTYPE html>
<html>

<head>
<title>AI or IRL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

#card{
position:relative;
transition:transform .25s ease;
}

video,img{
width:100%;
border-radius:12px;
margin-top:20px;
}

.swipe-arrows{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
font-size:18px;
font-weight:bold;
}

.swipe-left{color:#ff4d4d}
.swipe-right{color:#2ecc71}

.swipe-middle{
color:#666;
font-size:16px;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
border-radius:12px;
padding:20px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="container">

<h1>AI or IRL</h1>

<div>
Score: <span id="score">0</span><br>
🔥 Streak: <span id="streak">0</span>
</div>

<div id="card">

<div id="media"></div>

<div id="overlay" class="overlay hidden">

<h2 id="result"></h2>
<p id="tip"></p>

<button onclick="nextRound()">Next</button>

</div>

</div>

<div class="swipe-arrows">
<div class="swipe-left">⬅ AI</div>
<div class="swipe-middle">Swipe to decide</div>
<div class="swipe-right">REAL ➡</div>
</div>

</div>

<script>

let score=0
let streak=0
let currentAnswer=""
let locked=false

let startX=0
let currentX=0
let dragging=false

const card=document.getElementById("card")

/* MEDIA DATA */

const media=[

{type:"image",url:"https://thispersondoesnotexist.com/?1",answer:"ai"},
{type:"image",url:"https://thispersondoesnotexist.com/?2",answer:"ai"},

{type:"image",url:"https://picsum.photos/400?1",answer:"real"},
{type:"image",url:"https://picsum.photos/400?2",answer:"real"},

{type:"video",url:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",answer:"real"},
{type:"video",url:"https://www.w3schools.com/html/mov_bbb.mp4",answer:"ai"}

]

function newRound(){

locked=false

let item=media[Math.floor(Math.random()*media.length)]

currentAnswer=item.answer

renderMedia(item)

}

function renderMedia(item){

let mediaDiv=document.getElementById("media")

mediaDiv.innerHTML=""

if(item.type==="image"){

let img=document.createElement("img")
img.src=item.url+"&"+Math.random()

mediaDiv.appendChild(img)

}else{

let video=document.createElement("video")

video.autoplay=true
video.loop=true
video.muted=true
video.playsInline=true

let source=document.createElement("source")
source.src=item.url
source.type="video/mp4"

video.appendChild(source)
mediaDiv.appendChild(video)

}

}

function guess(answer){

if(locked)return
locked=true

let correct=currentAnswer

if(answer===correct){

score++
streak++

document.getElementById("result").innerText=`Correct — ${correct.toUpperCase()}!`

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

setTimeout(newRound,900)

}else{

streak=0

document.getElementById("result").innerText=`Incorrect — ${correct.toUpperCase()}!`

/* SHOW TIP ONLY IF AI WAS GUESSED AS REAL */

if(correct==="ai" && answer==="real"){
generateTip()
}else{
document.getElementById("tip").innerText=""
}

document.getElementById("overlay").classList.remove("hidden")

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

}

}

function nextRound(){

document.getElementById("overlay").classList.add("hidden")

newRound()

}

function generateTip(){

const tips=[
"AI often struggles with teeth and earrings.",
"Look for strange symmetry in faces.",
"Background objects may warp unnaturally.",
"Lighting may look inconsistent."
]

document.getElementById("tip").innerText=
tips[Math.floor(Math.random()*tips.length)]

}

/* SWIPE LOGIC */

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
dragging=true
})

card.addEventListener("touchmove",e=>{

if(!dragging)return

currentX=e.touches[0].clientX-startX
card.style.transform=`translateX(${currentX}px)`

})

card.addEventListener("touchend",()=>{

dragging=false

if(currentX>120){
card.style.transform="translateX(500px)"
guess("real")
}

else if(currentX<-120){
card.style.transform="translateX(-500px)"
guess("ai")
}

else{
card.style.transform="translateX(0)"
}

currentX=0

})

newRound()

</script>

</body>

</html>
