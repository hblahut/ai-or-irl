<!DOCTYPE html>
<html>

<head>
<title>AI or IRL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

#card{
position:relative;
}

img{
width:100%;
border-radius:12px;
margin-top:20px;
}

.swipe-arrows{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:14px;
font-size:18px;
font-weight:bold;
}

.swipe-left{color:#ff4d4d}
.swipe-right{color:#2ecc71}
.swipe-middle{color:#666}

.feedback{

position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);

font-size:40px;
font-weight:bold;

color:white;
text-shadow:0 2px 10px rgba(0,0,0,.6);

opacity:0;
transition:opacity .2s;

}

.overlay{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,.85);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;
border-radius:12px;
padding:20px;

}

.hidden{display:none;}

button{
margin-top:20px;
padding:14px 24px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>AI or IRL</h1>

<div>
Score: <span id="score">0</span><br>
🔥 Streak: <span id="streak">0</span>
</div>

<div id="card">

<img id="image">

<div id="feedback" class="feedback"></div>

<div id="overlay" class="overlay hidden">

<p id="tip"></p>

<button onclick="nextRound()">Continue</button>

</div>

</div>

<div class="swipe-arrows">
<div class="swipe-left">⬅ AI</div>
<div class="swipe-middle">Swipe to decide</div>
<div class="swipe-right">REAL ➡</div>
</div>

</div>

<script>

let score=0
let streak=0
let answer=""
let locked=false

let startX=0

const img=document.getElementById("image")
const feedback=document.getElementById("feedback")

const aiImages=[
"https://thispersondoesnotexist.com/",
"https://thispersondoesnotexist.com/?2",
"https://thispersondoesnotexist.com/?3"
]

const realImages=[
"https://picsum.photos/400?1",
"https://picsum.photos/400?2",
"https://picsum.photos/400?3"
]

function newRound(){

locked=false
feedback.style.opacity=0

let isAI=Math.random()<0.5

if(isAI){
answer="ai"
img.src=aiImages[Math.floor(Math.random()*aiImages.length)]+"?"+Math.random()
}else{
answer="real"
img.src=realImages[Math.floor(Math.random()*realImages.length)]+"?"+Math.random()
}

}

function guess(choice){

if(locked)return
locked=true

if(choice===answer){

score++
streak++

showFeedback("CORRECT!", "#2ecc71")

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

setTimeout(newRound,900)

}else{

streak=0

showFeedback("INCORRECT!", "#ff4d4d")

document.getElementById("score").innerText=score
document.getElementById("streak").innerText=streak

/* show tip ONLY if AI guessed as real */

if(answer==="ai" && choice==="real"){

setTimeout(()=>{
generateTip()
document.getElementById("overlay").classList.remove("hidden")
},700)

}else{

setTimeout(newRound,900)

}

}

}

function showFeedback(text,color){

feedback.innerText=text
feedback.style.color=color
feedback.style.opacity=1

}

function nextRound(){

document.getElementById("overlay").classList.add("hidden")

newRound()

}

function generateTip(){

const tips=[
"Look for strange symmetry in faces.",
"AI often struggles with teeth.",
"Earrings may be mismatched.",
"Hair strands may merge into the background."
]

document.getElementById("tip").innerText=
tips[Math.floor(Math.random()*tips.length)]

}

/* SWIPE */

const card=document.getElementById("card")

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX
let diff=endX-startX

if(Math.abs(diff)<50)return

if(diff>0){
guess("real")
}else{
guess("ai")
}

})

newRound()

</script>

</body>

</html>
